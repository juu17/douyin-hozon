# douyin-hozon settings — template, copied to ./config.yml on first run.
# Thereafter the TUI auto-saves all your inputs across the 6 modes into
# config.yml as you edit. config.yml is gitignored; this file is committed.

# Current mode (one of the 6 keys under `modes:` below).
modeId: single-video

# Douyin cookies, populated by the "Capture Cookies" command (press /).
# Leave as {} on first run.
cookieJar: {}

# Settings that apply across every mode. Change `savePath` here and every mode
# uses it; toggle `includeMusic` here and it affects all media-mode downloads.
shared:
  # Empty `savePath` = your OS Downloads dir + douyin-hozon/.
  #   macOS:   ~/Downloads/douyin-hozon/
  #   Windows: %USERPROFILE%\Downloads\douyin-hozon\
  #   Linux:   honors $XDG_DOWNLOAD_DIR, then ~/.config/user-dirs.dirs,
  #            then ~/Downloads, finally ~.
  savePath: ""
  includeCover: true
  includeMusic: true
  includeAvatar: true
  includeJson: true
  thread: "5"
  retryTimes: "3"
  # Path Preference — toggles each segment of the download path.
  #   defaults -> <savePath>/<author>/<title>_<id>/<title>_<id>.mp4 ...
  #   all-on   -> <savePath>/<author>/<mode>/<date>_<title>_<id>/...
  #   all-off  -> <savePath>/<id>/<id>.mp4 ...
  # Untoggling pathDate / pathTitle also drops them from the filename prefix.
  pathAuthor: true
  pathMode: false
  pathDate: false
  pathTitle: true
  quietLogs: true
  proxy: ""
  # Manual cookie overrides — usually unused; "Capture Cookies" fills cookieJar above.
  msToken: ""
  ttwid: ""
  odin_tt: ""
  passportCsrfToken: ""
  sidGuard: ""

# Per-mode inputs — each mode REMEMBERS its own URL field plus its
# limit/date filters independently.
modes:
  single-video:
    videoUrl: ""

  image-note:
    noteUrl: ""

  collection:
    collectionUrl: ""
    limit: "0"
    startTime: ""
    endTime: ""

  music-track:
    musicUrl: ""

  creator-liked-posts:
    creatorUrl: ""
    limit: "0"
    startTime: ""
    endTime: ""

  my-favorite-collection:
    favoriteSource: "https://www.douyin.com/user/self?showTab=favorite_collection"
    limit: "0"
